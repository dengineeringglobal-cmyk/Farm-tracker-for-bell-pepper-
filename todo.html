<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #73a5ff, #5477c3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        #todoApp {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        input[type="text"] {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 200px;
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        .completed { text-decoration: line-through; color: #ccc; }
    </style>
</head>
<body>
    <div id="todoApp">
        <h1>To-Do List</h1>
        <input type="text" id="taskInput" placeholder="Add new task..." />
        <button id="addTaskBtn">Add Task</button>
        <h2>Tasks</h2>
        <ul id="taskList"></ul>
        <h3>Statistics</h3>
        <p id="taskStats">Total Tasks: 0 | Completed Tasks: 0</p>
    </div>
    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const taskList = document.getElementById('taskList');
        const taskStats = document.getElementById('taskStats');

        const renderTasks = () => {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.textContent = task.name;
                if (task.completed) li.classList.add('completed');
                li.addEventListener('click', () => toggleTaskCompletion(index));
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTask(index);
                });
                li.appendChild(deleteBtn);
                taskList.appendChild(li);
            });
            updateStats();
        };

        const addTask = () => {
            const taskName = taskInput.value.trim();
            if (taskName) {
                tasks.push({ name: taskName, completed: false });
                taskInput.value = '';
                saveTasks();
                renderTasks();
            }
        };

        const deleteTask = (index) => {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        };

        const toggleTaskCompletion = (index) => {
            tasks[index].completed = !tasks[index].completed;
            saveTasks();
            renderTasks();
        };

        const saveTasks = () => {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        };

        const updateStats = () => {
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(task => task.completed).length;
            taskStats.textContent = `Total Tasks: ${totalTasks} | Completed Tasks: ${completedTasks}`;
        };

        addTaskBtn.addEventListener('click', addTask);
        renderTasks();
    </script>
</body>
</html>
