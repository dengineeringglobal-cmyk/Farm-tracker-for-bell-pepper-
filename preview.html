<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Farm Tracker Login</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background: linear-gradient(to right, #4caf50, #2196f3);\n            color: white;\n        }\n        .container {\n            background: rgba(255, 255, 255, 0.1);\n            border-radius: 10px;\n            padding: 20px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);\n        }\n        h2 {\n            margin-bottom: 20px;\n        }\n        input[type="email"], input[type="password"] {\n            width: 100%;\n            padding: 10px;\n            margin: 10px 0;\n            border: none;\n            border-radius: 5px;\n        }\n        button {\n            background-color: #4caf50;\n            color: white;\n            padding: 10px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n        }\n        button:hover {\n            background-color: #45a049;\n        }\n        .stats {\n            margin-top: 20px;\n        }\n        .error {\n            color: red;\n            display: none;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h2>Farm Tracker Login</h2>\n        <form id="loginForm">\n            <input type="email" id="email" placeholder="Email" required />\n            <span class="error" id="emailError">Invalid email format</span>\n            <input type="password" id="password" placeholder="Password" required />\n            <span class="error" id="passwordError">Invalid password</span>\n            <button type="submit">Login</button>\n        </form>\n        <div class="stats">\n            <h3>Farm Statistics</h3>\n            <p>Total Plots: <span id="totalPlots">5</span></p>\n            <p>Healthy Plants: <span id="healthyPlants">40</span></p>\n            <p>Harvest Ready: <span id="harvestReady">10</span></p>\n        </div>\n        <div class="management">\n            <h3>Management Features</h3>\n            <button id="salesBtn">Sales</button>\n            <button id="settingsBtn">Settings</button>\n        </div>\n    </div>\n    <script>\n        document.getElementById('loginForm').addEventListener('submit', function(event) {\n            event.preventDefault();\n            const email = document.getElementById('email').value;\n            const password = document.getElementById('password').value;\n            let valid = true;\n\n            // Simple email validation\n            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;\n            if (!emailRegex.test(email)) {\n                document.getElementById('emailError').style.display = 'block';\n                valid = false;\n            } else {\n                document.getElementById('emailError').style.display = 'none';\n            }\n\n            // Simple password validation\n            if (password.length < 6) {\n                document.getElementById('passwordError').style.display = 'block';\n                valid = false;\n            } else {\n                document.getElementById('passwordError').style.display = 'none';\n            }\n\n            if (valid) {\n                alert('Logged in successfully!');\n                // Additional logic for login can go here\n                console.log(`Email: ${email}, Password: ${password}`);\n            }\n        });\n    </script>\n</body>\n</html>
